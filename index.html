<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Hastane Oyunu</title>
    <style>
        body { 
            margin: 0; 
            background-color: #2c3e50; /* Dış mekan rengi */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            color: white;
            font-family: sans-serif;
        }
        canvas { 
            background-color: #34495e; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            image-rendering: pixelated; /* Bloklu görünümü korur */
        }
        #ui { position: absolute; top: 10px; left: 10px; }
    </style>
</head>
<body>
    <div id="ui">Hareket: W, A, S, D</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Klavye Kontrolleri
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        // Oyuncu (Doktor)
        const player = {
            x: 400, y: 300, width: 24, height: 24, speed: 4, color: '#ffffff'
        };

        // Basit NPC'ler
        const npcs = [
            { x: 150, y: 150, width: 20, height: 20, color: '#ff9ff3', type: 'nurse' }, // Hemşire 1
            { x: 650, y: 150, width: 20, height: 20, color: '#ff9ff3', type: 'nurse' }, // Hemşire 2
            { x: 400, y: 200, width: 20, height: 20, color: '#54a0ff', type: 'patient', dx: 1, dy: 1 }, // Hasta 1
            { x: 300, y: 400, width: 20, height: 20, color: '#54a0ff', type: 'patient', dx: -1, dy: -0.5 } // Hasta 2
        ];

        // Oyun Döngüsü (Game Loop)
        function update() {
            // Oyuncu Hareketi
            if (keys.w) player.y -= player.speed;
            if (keys.s) player.y += player.speed;
            if (keys.a) player.x -= player.speed;
            if (keys.d) player.x += player.speed;

            // Oyuncuyu ekran içinde tutma
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

            // Hastaların rastgele hareketi
            npcs.forEach(npc => {
                if (npc.type === 'patient') {
                    npc.x += npc.dx;
                    npc.y += npc.dy;
                    // Duvara çarpınca geri dön
                    if (npc.x <= 200 || npc.x >= 600) npc.dx *= -1;
                    if (npc.y <= 100 || npc.y >= 500) npc.dy *= -1;
                }
            });
        }

        function draw() {
            // Ekranı Temizle
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Hastane Krokisi Çizimi (Zeminler)
            ctx.fillStyle = '#bdc3c7'; // Ana Koridor
            ctx.fillRect(200, 50, 400, 500);
            
            ctx.fillStyle = '#95a5a6'; // Sol Oda (Muayene)
            ctx.fillRect(50, 100, 150, 200);
            
            ctx.fillStyle = '#95a5a6'; // Sağ Oda (Müdahale)
            ctx.fillRect(600, 100, 150, 200);

            // 2. Ambulans Çizimi
            ctx.fillStyle = '#f1f2f6';
            ctx.fillRect(350, 550, 100, 50); // Ambulans gövdesi
            
            // Çakar Işıklar (Zamana göre yanıp sönme)
            const flash = Math.floor(Date.now() / 300) % 2 === 0;
            ctx.fillStyle = flash ? '#ff4757' : '#2f3542'; // Kırmızı çakar
            ctx.fillRect(360, 550, 20, 10);
            ctx.fillStyle = !flash ? '#1e90ff' : '#2f3542'; // Mavi çakar
            ctx.fillRect(420, 550, 20, 10);

            // 3. NPC'leri Çiz
            npcs.forEach(npc => {
                ctx.fillStyle = npc.color;
                ctx.fillRect(npc.x, npc.y, npc.width, npc.height);
            });

            // 4. Oyuncuyu (Doktor) Çiz
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Oyuncu Gösterge Oku (Kafasının üstünde)
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y - 15);
            ctx.lineTo(player.x + player.width / 2 - 8, player.y - 25);
            ctx.lineTo(player.x + player.width / 2 + 8, player.y - 25);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Oyunu Başlat
        loop();
    </script>
</body>
</html>
